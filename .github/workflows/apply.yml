name: Apply Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type APPLY to provision the dev platform"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: terraform-apply-dev
  cancel-in-progress: false

jobs:
  apply:
    name: Terraform Apply
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
    steps:
      - name: Confirm protected apply
        env:
          APPLY_CONFIRMATION: ${{ inputs.confirm }}
        run: test "${APPLY_CONFIRMATION}" = "APPLY"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: dulcet-velocity-495612-j0
          workload_identity_provider: projects/894276514853/locations/global/workloadIdentityPools/github-actions/providers/inenp-iac
          service_account: github-actions-iac@dulcet-velocity-495612-j0.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: dulcet-velocity-495612-j0
          install_components: gke-gcloud-auth-plugin,kubectl

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.4"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform -chdir=environments/dev init -input=false

      - name: Terraform Validate
        run: terraform -chdir=environments/dev validate

      - name: Terraform Plan
        run: terraform -chdir=environments/dev plan -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform -chdir=environments/dev apply -input=false -auto-approve tfplan

      - name: Show GitOps applications
        run: kubectl -n argocd get applications
